services:
  gluetun_dns:
    image: qmcgaw/gluetun:latest
    networks:
      dns_net:
        ipv4_address: 172.44.0.9
    container_name: gluetun_dns
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 6882:6881 # what is this port for?
      - 6882:6881/udp
      - 5053:53/tcp # unbound
      - 5053:53/udp # unbound
    volumes:
      - /mnt/user/appdata/gluetun_dns:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=${VPN_TYPE}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - UPDATER_PERIOD=24h
      - TZ=Europe/Stockholm
    restart: unless-stopped

  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    networks:
      br0:
        ipv4_address: 192.168.1.53
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 85:80/tcp
    environment:
      - TZ=Europe/Stockholm
      - FTLCONF_webserver_port=85
      - FTLCONF_dns_upstreams=172.44.0.9#5053
    volumes:
      - /mnt/user/appdata/pihole/etc-pihole/:/etc/pihole/
      - /mnt/user/appdata/pihole/etc-dnsmasq.d/:/etc/dnsmasq.d/
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - CAP_CHOWN
      - CAP_SYS_TIME
      - CAP_NET_BIND_SERVICE

  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    network_mode: service:gluetun_dns
    volumes:
      - /mnt/user/appdata/unbound:/opt/unbound/etc/unbound
      - /dev/null:/dev/null
    depends_on:
      - gluetun_dns
    restart: unless-stopped

networks:
  dns_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.44.0.0/16
  br0:
    external: true
