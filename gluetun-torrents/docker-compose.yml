services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8080:8080 # qbittorrent
      - 5030:5030 # slskd
      - 5031:5031 # slskd
      - 50300:50300 # slskd
      - 11470:11470 #stremio-server
      - 6565:6565 # nicotineplus
      - 2234:2234 # nicotineplus
      - 7320:7320 # speedtest tracker
    volumes:
      - /mnt/user/appdata/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=custom # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_TYPE=${VPN_TYPE}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - TZ=Europe/Stockholm
      - UPDATER_PERIOD=24h
    restart: always

  qBittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qBittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Stockholm
      - WEBUI_PORT=8080
    volumes:
      - /mnt/user/appdata/qbittorrent:/config
      - /mnt/user/downloads:/downloads
    depends_on:
      - gluetun
    restart: always

  slskd:
    image: slskd/slskd
    container_name: slskd
    network_mode: "service:gluetun"
    user: 1000:100
    environment:
      - SLSKD_UMASK=022
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SHARED_DIR=/music;/youtube-paywall
      - SLSKD_SLSK_ADDRESS=vps.slsknet.org
      - SLSKD_SLSK_PORT=2271
      - SLSKD_SLSK_LISTEN_IP_ADDRESS=0.0.0.0
      - SLSKD_SLSK_LISTEN_PORT=50300
      - SLSKD_DOWNLOADS_DIR=/downloads
      - SLSKD_INCOMPLETE_DIR=/incomplete
    volumes:
      - /mnt/user/downloads:/downloads
      - /mnt/user/downloads/incomplete:/incomplete
      - /mnt/user/appdata/slskd:/app
      - /mnt/user/music:/music:rw
      - /mnt/user/media/Youtube:/youtube-paywall:rw
    restart: unless-stopped
    depends_on:
      - gluetun

  nicotineplus-proper:
    image: sirjmann92/nicotineplus-proper
    container_name: nicotine
    network_mode: "service:gluetun"
    #  env_file: .env # Optionally use a .env file to store environment variables and login credentials
    environment:
      - TZ=Europe/Stockholm
      - UMASK=022
      - DARKMODE=True
      - LOGIN=j0
      - PASSW=monkee##33
      - PUID=1000
      - PGID=100
      - UPNP=False
      - AUTO_CONNECT=True
      - TRAY_ICON=False
      - WEB_UI_PORT=6565 # for custom webUI port assignment. Should match 'port' env variable or VPN webUI port
    volumes:
      #- /your/media/directory:/downloads
      #- /your/share/directory:/shared
      - /mnt/user/appdata/nicotineplus-proper/config:/config
      - /mnt/user/appdata/nicotineplus-proper/data:/data
    restart: unless-stopped



  stremio-server:
    image: stremio/server:latest
    container_name: stremio-server
    network_mode: "service:gluetun"
    environment:
      - STREMIO_USERNAME=${STREMIO_USERNAME}
      - STREMIO_PASSWORD=${STREMIO_PASSWORD}
      - FFMPEG_BIN=/bin/ffmpeg
      - FFPROBE_BIN=/bin/ffprobe
    volumes:
      - /mnt/user/appdata/stremio-server:/stremio
      - /usr/bin/ffmpeg:/bin/ffmpeg:ro
      - /bin/ffprobe:/bin/ffprobe:ro
    depends_on:
      - gluetun
      - ffmpeg
    restart: unless-stopped

  ffmpeg:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg
    devices:
      - /dev/dri:/dev/dri
    environment:
      - VAAPI_DEVICE=/dev/dri/renderD128
    stdin_open: true
    tty: true
    volumes:
      - /mnt/user/appdata/ffmpeg:/config
    restart: unless-stopped
