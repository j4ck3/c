services:
  gluetun_torrents:
    image: qmcgaw/gluetun
    container_name: gluetun_torrents
    hostname: gluetun_torrents
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    expose:
      - "8080"  # qbittorrent
      - "6565"  # nicotineplus
      - "7476"  # qui (if needed later)
    volumes:
      - /mnt/user/appdata/gluetun-torrents:/gluetun
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - TZ=Europe/Stockholm
      - UPDATER_PERIOD=24h
      - DNS_SERVER=on
      - DNS_UPSTREAM_RESOLVER_TYPE=DoT
      - DNS_UPSTREAM_RESOLVERS=cloudflare
      - DNS_CACHING=on
      - DNS_ADDRESS=127.0.0.1
    networks:
      - npm_services
      - gluetun_net
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "1.1.1.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=npm_services"
      - "traefik.http.routers.qbittorrent.rule=Host(`torrent.hjacke.com`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.http.routers.nicotine.rule=Host(`nicotine.hjacke.com`)"
      - "traefik.http.routers.nicotine.entrypoints=websecure"
      - "traefik.http.routers.nicotine.tls=true"
      - "traefik.http.routers.nicotine.service=nicotine"
      - "traefik.http.services.nicotine.loadbalancer.server.port=6565"

  qBittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qBittorrent
    depends_on:
      gluetun_torrents:
        condition: service_started
    network_mode: service:gluetun_torrents
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Stockholm
      - WEBUI_PORT=8080
    volumes:
      - /mnt/user/appdata/qbittorrent:/config
      - /mnt/user/downloads/qbitorrent:/downloads
    restart: unless-stopped

  nicotineplus-proper:
    image: sirjmann92/nicotineplus-proper:latest
    container_name: nicotine
    depends_on:
      gluetun_torrents:
        condition: service_started
    network_mode: service:gluetun_torrents
    env_file:
      - .env
    environment:
      - TZ=Europe/Stockholm
      - UMASK=022
      - DARKMODE=True
      - LOGIN=${NICOTINE_USER}
      - PASSW=${NICOTINE_PASSW}
      - PUID=1000
      - PGID=100
      - UPNP=False
      - AUTO_CONNECT=True
      - TRAY_ICON=False
      - WEB_UI_PORT=6565
    volumes:
      - /mnt/user/downloads/soulseek:/downloads
      - /mnt/user/downloads/soulseek/incomplete:/incomplete
      - /mnt/user/music:/music:rw
      - /mnt/user/media/Youtube:/youtube-paywall:rw
      - /mnt/user/podcasts:/podcasts:rw
      - /mnt/user/syncthing/qqq:/nsfw:rw
      - /mnt/user/appdata/nicotineplus-proper/config:/config
      - /mnt/user/appdata/nicotineplus-proper/data:/data
      - /mnt/user/syncthing/apps:/apps:rw
    restart: unless-stopped

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    environment:
      - TZ=Europe/Stockholm
    volumes:
      - /mnt/user/appdata/qui:/config
    networks:
      - gluetun_net
      - npm_services
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=npm_services"
      - "traefik.http.routers.qui.rule=Host(`qui.hjacke.com`)"
      - "traefik.http.routers.qui.entrypoints=websecure"
      - "traefik.http.routers.qui.tls=true"
      - "traefik.http.routers.qui.service=qui"
      - "traefik.http.services.qui.loadbalancer.server.port=7476"

networks:
  gluetun_net:
    name: searxng_gluetun_net
    external: true
  npm_services:
    external: true
