services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8080:8080 # qbittorrent
      - 5030:5030 # slskd
      - 5031:5031 # slskd
      - 50300:50300 # slskd
      - 11470:11470 #stremio-server
      - 12470:12470 #stremio-server https
      - 6565:6565 # nicotineplus
      - 2234:2234 # nicotineplus
    volumes:
      - /mnt/user/appdata/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=custom # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_TYPE=${VPN_TYPE}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - TZ=Europe/Stockholm
      - UPDATER_PERIOD=24h
    restart: always

  qBittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qBittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Stockholm
      - WEBUI_PORT=8080
    volumes:
      - /mnt/user/appdata/qbittorrent:/config
      - /mnt/user/downloads:/downloads
    depends_on:
      - gluetun
    restart: always

  nicotineplus-proper:
    image: sirjmann92/nicotineplus-proper
    container_name: nicotine
    network_mode: service:gluetun
    #  env_file: .env # Optionally use a .env file to store environment variables and login credentials
    environment:
      - TZ=Europe/Stockholm
      - UMASK=022
      - DARKMODE=True
      - LOGIN=j0
      - PASSW=monkee##33
      - PUID=1000
      - PGID=100
      - UPNP=False
      - AUTO_CONNECT=True
      - TRAY_ICON=False
      - WEB_UI_PORT=6565
    volumes:
      - /mnt/user/downloads:/downloads
      - /mnt/user/downloads/incomplete:/incomplete
      - /mnt/user/music:/music:rw
      - /mnt/user/media/Youtube:/youtube-paywall:rw
      - /mnt/user/appdata/nicotineplus-proper/config:/config
      - /mnt/user/appdata/nicotineplus-proper/data:/data
    restart: unless-stopped
  stremio-server:
    image: stremio/server:latest
    container_name: stremio-server
    network_mode: "service:gluetun"
    environment:
      - STREMIO_USERNAME=${STREMIO_USERNAME}
      - STREMIO_PASSWORD=${STREMIO_PASSWORD}
      - FFMPEG_BIN=/bin/ffmpeg
      - FFPROBE_BIN=/bin/ffprobe
      - NO_CORS=1
      - APP_PATH=/stremio
    volumes:
      - /mnt/user/appdata/stremio-server:/stremio
      - /usr/bin/ffmpeg:/bin/ffmpeg:ro
      - /bin/ffprobe:/bin/ffprobe:ro
    depends_on:
      - gluetun
    restart: unless-stopped