services:

# if css fails again: 
# cd /home/ubuntu/c/erpnext
# docker compose up -d --force-recreate
# docker compose exec -T frontend bash -lc 'export PATH="/home/frappe/.nvm/versions/node/v20.19.2/bin:$PATH"; bench build --production'
# docker compose restart frontend
  configurator:
    image: frappe/erpnext:latest
    container_name: erpnext_configurator
    restart: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt; bench set-config -g db_host $$DB_HOST; bench set-config -gp db_port $$DB_PORT; bench set-config -g redis_cache "redis://$$REDIS_CACHE"; bench set-config -g redis_queue "redis://$$REDIS_QUEUE"; bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO"; bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      SOCKETIO_PORT: "9000"
    networks:
      - erpnext
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-socketio:
        condition: service_healthy

  create-site:
    image: frappe/erpnext:latest
    container_name: erpnext_create_site
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 mariadb:3306; wait-for-it -t 120 redis-cache:6379; wait-for-it -t 120 redis-queue:6379; export start=`date +%s`; until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done; echo "sites/common_site_config.json found"; bench new-site --mariadb-user-host-login-scope='%' --admin-password=${ADMIN_PASSWORD:-admin_pass_2024} --db-root-username=root --db-root-password=${MARIADB_ROOT_PASSWORD} --install-app erpnext --set-default accounting.rjhdesign.se;
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_pass_2024}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  backend:
    image: frappe/erpnext:latest
    container_name: erpnext_backend
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully

  frontend:
    image: frappe/erpnext:latest
    container_name: erpnext_frontend
    restart: unless-stopped
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-accounting.rjhdesign.se}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.erpnext.rule=Host(`accounting.rjhdesign.se`)"
      - "traefik.http.routers.erpnext.entrypoints=websecure"
      - "traefik.http.routers.erpnext.tls=true"
      - "traefik.http.routers.erpnext.middlewares=erpnext-headers"
      - "traefik.http.routers.erpnext.service=erpnext-service"
      - "traefik.http.middlewares.erpnext-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.erpnext-headers.headers.customrequestheaders.X-Forwarded-Host=accounting.rjhdesign.se"
      - "traefik.http.services.erpnext-service.loadbalancer.server.port=8080"
      - "traefik.http.routers.erpnext-socketio.rule=Host(`accounting.rjhdesign.se`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.erpnext-socketio.entrypoints=websecure"
      - "traefik.http.routers.erpnext-socketio.tls=true"
      - "traefik.http.routers.erpnext-socketio.service=erpnext-socketio-service"
      - "traefik.http.services.erpnext-socketio-service.loadbalancer.server.port=9000"
    networks:
      - erpnext
      - traefik
    depends_on:
      - backend
      - websocket

  websocket:
    image: frappe/erpnext:latest
    container_name: erpnext_websocket
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    expose:
      - "9000"
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully

  queue-short:
    image: frappe/erpnext:latest
    container_name: erpnext_queue_short
    restart: unless-stopped
    command: bench worker --queue short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully

  queue-long:
    image: frappe/erpnext:latest
    container_name: erpnext_queue_long
    restart: unless-stopped
    command: bench worker --queue long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully

  scheduler:
    image: frappe/erpnext:latest
    container_name: erpnext_scheduler
    restart: unless-stopped
    command: bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
    networks:
      - erpnext
    depends_on:
      configurator:
        condition: service_completed_successfully

  mariadb:
    image: mariadb:10.11
    container_name: erpnext_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erpnext
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake

  redis-cache:
    image: redis:7-alpine
    container_name: erpnext_redis_cache
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erpnext

  redis-queue:
    image: redis:7-alpine
    container_name: erpnext_redis_queue
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erpnext

  redis-socketio:
    image: redis:7-alpine
    container_name: erpnext_redis_socketio
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_socketio_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erpnext

volumes:
  sites:
  assets:
  mariadb_data:
  redis_cache_data:
  redis_queue_data:
  redis_socketio_data:


networks:
  erpnext:
    driver: bridge
  traefik:
    external: true
