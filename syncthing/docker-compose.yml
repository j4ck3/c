services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing #optional
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Stockholm
    volumes:
      - /mnt/user/appdata/syncthing/config:/config
      - /mnt/user/syncthing:/syncthing
      - /mnt/user/trilium:/trilium
      - /mnt/user/appdata:/unraid-appdata
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
