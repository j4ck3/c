services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=npm_services"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Git over SSH (port 22) -> routed via TCP to Gitea
      - "--entrypoints.ssh.address=:22"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    # No ports needed - macvlan gives Traefik its own IP (10.0.0.25).
    # Forward router: public IP 80/443 → 10.0.0.25:80 and 10.0.0.25:443 so gitea.hjacke.com works.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/documents/compose/traefik/certs:/etc/traefik/certs:ro
      - /mnt/user/documents/compose/traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt/user/appdata/traefik/acme.json:/etc/traefik/acme.json
      - /mnt/user/appdata/Nginx-Proxy-Manager-Official/letsencrypt:/etc/traefik/letsencrypt:ro
    # Required for proxying to host-network services (e.g. Music Assistant on port 8095)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      br0_docker:
        ipv4_address: 10.0.0.25
      npm_services: {}

networks:
  br0_docker:
    external: true
  npm_services:
    external: true
