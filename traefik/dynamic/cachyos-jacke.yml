# https://cachyos.hjacke.com -> Glances on the gaming desktop (cachyos-jacke)
# Backend: LAN IP or Netbird IP of the workstation (default: 10.0.0.146).

http:
  routers:
    cachyos-jacke:
      rule: "Host(`cachyos.hjacke.com`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: cachyos-jacke
      middlewares:
        - cachyos-jacke-auth

  services:
    cachyos-jacke:
      loadBalancer:
        servers:
          - url: "http://10.0.0.146:61208"
        passHostHeader: true

  middlewares:
    cachyos-jacke-auth:
      basicAuth:
        users:
          # Generate: docker run --rm httpd:alpine htpasswd -nbB USER PASS
          # Must match Glances credentials or use a separate Traefik-only user.
          - "jacke:CHANGE_ME"
