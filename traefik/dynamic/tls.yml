tls:
  stores:
    default:
      # Default cert (fallback when no SNI match). Use existing cert; hjacke.com uses letsencrypt resolver.
      defaultCertificate:
        certFile: /etc/traefik/certs/rjhdesign.pem
        keyFile: /etc/traefik/certs/rjhdesign-key.pem
  certificates:
    # Certificates that exist in /etc/traefik/certs. hjacke.com uses certresolver=letsencrypt in router labels.
    - certFile: /etc/traefik/certs/rjhdesign.pem
      keyFile: /etc/traefik/certs/rjhdesign-key.pem
    - certFile: /etc/traefik/certs/origin.pem
      keyFile: /etc/traefik/certs/origin-key.pem
