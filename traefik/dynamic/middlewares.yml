http:
  middlewares:
    # Compression middleware for better performance
    compression:
      compress: {}
    
    # Buffering middleware to handle large responses
    buffering:
      buffering:
        maxRequestBodyBytes: 10485760  # 10MB
        maxResponseBodyBytes: 10485760  # 10MB
        memRequestBodyBytes: 2097152  # 2MB
        memResponseBodyBytes: 2097152  # 2MB
        retryExpression: "IsNetworkError() && Attempts() < 2"
    
    # Compression middleware for Seerr
    seerr-compress:
      compress: {}
    
    # Buffering middleware for Seerr
    seerr-buffering:
      buffering:
        maxRequestBodyBytes: 10485760
        maxResponseBodyBytes: 10485760
        memRequestBodyBytes: 2097152
        memResponseBodyBytes: 2097152
        retryExpression: "IsNetworkError() && Attempts() < 2"
