services:
  13ft:
    image: ghcr.io/wasi-master/13ft:latest
    container_name: 13ft
    hostname: 13ft
    restart: unless-stopped
    networks:
      - npm_services
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=npm_services"
      - "traefik.http.routers.13ft.rule=Host(`13ft.hjacke.com`)"
      - "traefik.http.routers.13ft.entrypoints=websecure"
      - "traefik.http.routers.13ft.tls=true"
      - "traefik.http.routers.13ft.tls.certresolver=letsencrypt"
      - "traefik.http.services.13ft.loadbalancer.server.port=5000"
    environment:
      - TZ=Europe/Stockholm

networks:
  npm_services:
    external: true
