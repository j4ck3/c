# Netbird combined server config (management + signal + relay + embedded STUN)
# Replace NETBIRD_DOMAIN with your public hostname (e.g. netbird.hjacke.com)

server:
  listenAddress: ":80"
  exposedAddress: "https://netbird.hjacke.com:443"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"
  authSecret: "gn6aGwUh4Ldpy7iqvY/lWG7bJkQY/RuDQt0V5xmf+Bk="
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "https://netbird.hjacke.com/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "https://netbird.hjacke.com/nb-auth"
      - "https://netbird.hjacke.com/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  store:
    engine: "sqlite"
    dsn: ""
    encryptionKey: "843W4hwkj7ByFEFWBL/vxDnfNMByT6loF8E/VogPZqI="
