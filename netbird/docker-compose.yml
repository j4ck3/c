# Netbird VPN mesh stack (combined netbird-server + dashboard)
# Routing for netbird.hjacke.com is defined in traefik/dynamic/netbird.yml (file provider).
# UDP 3478 must be reachable on the host for STUN (NAT traversal).

services:
  netbird-dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    env_file:
      - ./dashboard.env
    networks:
      - npm_services
    ports:
      - "8080:80"
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "2"

  netbird-server:
    image: netbirdio/netbird-server:latest
    container_name: netbird-server
    restart: unless-stopped
    networks:
      - npm_services
    ports:
      - "3478:3478/udp"
    volumes:
      - netbird_data:/var/lib/netbird
      - ./config.yaml:/etc/netbird/config.yaml:ro
    command: ["--config", "/etc/netbird/config.yaml"]
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "2"

  netbird-client:
    image: netbirdio/netbird:latest
    container_name: netbird-client
    hostname: ${NETBIRD_CLIENT_HOSTNAME}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/net/tun
    network_mode: host
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY:?Set NB_SETUP_KEY in .env or environment}
      - NB_MANAGEMENT_URL=https://netbird.hjacke.com/
      # Avoid NetBird pointing resolv.conf at the local mesh DNS (100.x); when relay/tunnel
      # is down, that breaks resolving the management URL and prevents recovery.
      - NB_DISABLE_DNS=true
      - NB_ALLOW_SERVER_SSH=true
      # Use machine identity (ACL-only); omit if you use IdP/JWT for SSH
      - NB_DISABLE_SSH_AUTH=true
    volumes:
      - netbird_client_data:/var/lib/netbird
    depends_on:
      - netbird-server
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "2"

volumes:
  netbird_data:
    name: netbird_data
  netbird_client_data:
    name: netbird_client_data

networks:
  npm_services:
    external: true
