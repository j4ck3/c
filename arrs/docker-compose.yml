services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - /mnt/user/appdata/sonarr/config:/config
      - /mnt/user/media/TV:/tv
      - /mnt/user/downloads/qbitorrent:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
