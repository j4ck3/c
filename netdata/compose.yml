# Netdata — real-time monitoring at https://netdata.hjacke.com (Traefik labels)
# No ports published; Traefik reaches Netdata via npm_services.

services:
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: netdata
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    environment:
      - TZ=Europe/Stockholm
    volumes:
      - /mnt/user/appdata/netdata:/etc/netdata:rw
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - npm_services
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netdata.rule=Host(`netdata.hjacke.com`)"
      - "traefik.http.routers.netdata.entrypoints=websecure"
      - "traefik.http.routers.netdata.tls.certresolver=letsencrypt"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"
      - "traefik.docker.network=npm_services"
      # HTTP → HTTPS
      - "traefik.http.routers.netdata-http.rule=Host(`netdata.hjacke.com`)"
      - "traefik.http.routers.netdata-http.entrypoints=web"
      - "traefik.http.routers.netdata-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

volumes:
  netdata_lib:
    name: netdata_lib
  netdata_cache:
    name: netdata_cache

networks:
  npm_services:
    external: true
