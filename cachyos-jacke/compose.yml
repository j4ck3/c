# Gaming / dev desktop (cachyos-jacke) — system + AMD GPU metrics.
# Runs on the workstation (not tower). Reach via Netbird:
#   http://cachyos-jacke.netbird.hjacke.com:61208
# Optional LAN/Traefik: https://cachyos.hjacke.com (see ../traefik/dynamic/cachyos-jacke.yml)

services:
  glances:
    image: nicolargo/glances:latest-full
    container_name: cachyos-jacke-glances
    restart: unless-stopped
    ports:
      - "${GLANCES_PORT:-61208}:61208"
    environment:
      TZ: Europe/Stockholm
      # Access control: Netbird mesh only (no public port forward). Optional LAN via Traefik basic auth.
      GLANCES_OPT: "-w -B 0.0.0.0"
    volumes:
      # Rootless Docker on this host (jacke uid 1000)
      - /run/user/1000/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - video
    security_opt:
      - apparmor:unconfined
