# Netdata on cachyos-jacke. Netbird-only — http://cachyos-jacke.netbird.hjacke.com:19999
# (bridge + port 19999; rootless Docker cannot use host network reliably)

services:
  netdata:
    image: netdata/netdata:stable
    container_name: cachyos-jacke-netdata
    hostname: cachyos-jacke
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    ports:
      - "19999:19999"
    environment:
      TZ: Europe/Stockholm
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /run/user/1000/docker.sock:/var/run/docker.sock:ro

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
