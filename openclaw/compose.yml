services:
  openclaw-gateway:
    image: openclaw:varlock
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      - BITWARDEN_ACCESS_TOKEN=${BITWARDEN_ACCESS_TOKEN}
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      - AGENT_BROWSER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - /mnt/user/appdata/openclaw/config:/home/openclaw/.openclaw
      - /mnt/user/appdata/openclaw/workspace:/home/openclaw/workspace
      - ./website_credentials.json:/home/openclaw/.openclaw/secrets/website_credentials.json:ro
      - ./.env.schema:/app/.env.schema:ro
    networks:
      - npm_services
    depends_on:
      openviking:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=npm_services"
      - "traefik.http.routers.openclaw.rule=Host(`openclaw.hjacke.com`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls=true"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      # Explicit service link (same pattern as zeroclaw / other *.hjacke.com apps)
      - "traefik.http.routers.openclaw.service=openclaw"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    healthcheck:
      # Gateway may spend ~60s+ building Control UI on first start; Traefik returns 502 until this passes.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18789/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  openviking:
    build:
      context: .
      dockerfile: Dockerfile.openviking
    image: openviking:local
    container_name: openviking
    restart: unless-stopped
    environment:
      - BITWARDEN_ACCESS_TOKEN=${BITWARDEN_ACCESS_TOKEN}
    volumes:
      - /mnt/user/appdata/openclaw/openviking:/app/data
      - ./.env.schema:/schema/.env.schema:ro
    networks:
      - npm_services
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  npm_services:
    external: true
