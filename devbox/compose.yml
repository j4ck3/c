services:
  dind:
    image: docker:dind
    container_name: devbox-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-storage:/var/lib/docker
    ports:
      - "2376:2375" # DinD API (2376 to avoid conflict with host Docker on 2375)
      - "13000:3000" # Apps in DinD (13000 to avoid conflict with host 3000)
      - "18080:8080" # Apps in DinD (18080 to avoid conflict with host 8080)
    networks:
      - devbox-network
    restart: unless-stopped

  devbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: devbox:local
    container_name: devbox
    hostname: devbox
    depends_on:
      - dind
    privileged: true
    volumes:
      # Persistent workspace for projects
      - devbox-workspace:/workspace
      # Persistent home directory (dotfiles, nvim config, etc.)
      - devbox-home:/home/dev
      # Persistent SSH host keys (so they don't change on container restart)
      - devbox-ssh-keys:/etc/ssh/keys
      # SSH keys for GitHub/GitLab (optional)
      - ${HOME}/.ssh:/home/dev/.ssh:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./new-session.sh:/usr/local/bin/new-session.sh:ro
      # Neovim: show hidden files in netrw and Telescope (copied into ~/.config/nvim by entrypoint)
      - ./nvim-config:/opt/devbox-nvim-config:ro
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:-}
    networks:
      - devbox-network
    ports:
      # Local access without auth
      - "7681:7681" # Web terminal (ttyd)
      - "2222:22" # SSH access for local terminal
      # Dev app ports are on dind (13000→3000, 18080→8080); add more on dind if needed
    restart: unless-stopped
    tty: true
    stdin_open: true

  # Remote profile - adds Traefik routing with BasicAuth
  devbox-remote:
    build:
      context: .
      dockerfile: Dockerfile
    image: devbox:local
    container_name: devbox-remote
    hostname: devbox-remote
    profiles:
      - remote
    depends_on:
      - dind
    privileged: true
    volumes:
      - devbox-workspace:/workspace
      - devbox-home:/home/dev
      # SSH keys for GitHub/GitLab (optional)
      - ${HOME}/.ssh:/home/dev/.ssh:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./new-session.sh:/usr/local/bin/new-session.sh:ro
      - ./nvim-config:/opt/devbox-nvim-config:ro
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - TERM=xterm-256color
      - COLORTERM=truecolor
    networks:
      - devbox-network
      - npm_services
    ports:
      - "7681:7681"  # Expose ttyd so Traefik (on another host) can reach this host:7681
    # Route is in traefik/dynamic/devbox.yml (Traefik is on another host)
    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  devbox-workspace:
    name: devbox-workspace
  devbox-home:
    name: devbox-home
  devbox-ssh-keys:
    name: devbox-ssh-keys
  dind-storage:
    name: devbox-dind-storage

networks:
  devbox-network:
    name: devbox-network
  npm_services:
    external: true
