services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: Nginx-Proxy-Manager-Official
    restart: unless-stopped
    # Using macvlan network to give NPM its own IP address (10.0.0.25) for external access
    # Also connecting to npm_services network to communicate with proxied services
    # Flow: DuckDNS -> 10.0.0.25:80/443 (NPM) -> Service via Docker hostname
    networks:
      br0_docker:
        ipv4_address: 10.0.0.25  # NPM will have its own IP for external access
      npm_services: {}
    volumes:
      - /mnt/user/appdata/Nginx-Proxy-Manager-Official/data:/data
      - /mnt/user/appdata/Nginx-Proxy-Manager-Official/letsencrypt:/etc/letsencrypt
      - /tmp/Nginx-Proxy-Manager-Official/var/log:/var/log
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      disable: true

networks:
  br0_docker:
    external: true
  npm_services:
    external: true

