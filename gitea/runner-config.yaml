# act_runner config: run job containers on the same network as Gitea
# so the hostname "server" resolves inside the job (fixes checkout "Could not resolve host: server").
log:
  level: info
runner:
  file: .runner
  capacity: 1
  timeout: 3h
  # Use 127.0.0.1:3002 so the host's Docker daemon (used via docker.sock) hits Gitea on the host port.
  # gitea.hjacke.com resolves to 127.0.0.1 on the tower, and the daemon would use port 80 → 404 for /v2/.
  envs:
    GITEA_REGISTRY: 127.0.0.1:3002
container:
  # Use Gitea's network so job containers can resolve "server" and reach Gitea at http://server:3000
  network: npm_services
